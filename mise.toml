# Minimum `mise` version. If not matched, mise guides the user to update.
# -> Bump when relying on a newly introduced setting.
min_version = "2026.6.6"

# ── 🛠️ tools ──────────────────────────────────────────────────────────────────
[tools]

# runtime
go = "1.25"

# linters & formatters
gofumpt = "0.10"    # stricter gofmt
golangci-lint = "2" # Go static analysis suite
shellcheck = "0.11" # used by actionlint for workflow run: blocks
actionlint = "1"    # GitHub Actions lint
zizmor = "1"        # GitHub Actions security
pinact = "4"        # pin GitHub Actions to SHAs (needs a token; see hk.pkl)
taplo = "0.10"      # TOML lint + format
yamllint = "1"      # YAML structural lint
typos = "1"         # spell-check (config: typos.toml)
lychee = "0.24"     # link checker (config: lychee.toml; offline by default)
rumdl = "0.2"       # Markdown lint + format (config: rumdl.toml)
betterleaks = "1"   # secret scanner (config: .betterleaks.toml)

# pre-commit
hk = "1.50.0" # full MAJOR.MINOR.PATCH — must match hk.pkl's amends/import URLs

# ── 📏 vars ───────────────────────────────────────────────────────────────────
[vars]
setup_version = "1" # Increment when setup steps change / users must re-run setup.

# ── ▶️ tasks ──────────────────────────────────────────────────────────────────
[tasks.check]
description = "Run all linters, formatters & validators as ran by pre-commit and in PR's CI"
alias = ["lint"]
usage = '''
    flag "--fix"              help="apply fixes instead of only reporting"
    flag "--all"              help="run on all files (default: staged only)"
    flag "--pr"               help="only files changed vs the default branch (conflicts with --all)"
    flag "--fail-fast"        help="stop at the first failing step (default: run all, report every failure)"
    flag "--step <step>"      var=#true help="run only these step(s)"
    flag "--skip-step <step>" var=#true help="skip these step(s)"
    complete "step" run="hk check --plan --all --json --no-progress 2>/dev/null | jq -r '.steps[].name'"
'''
run = '''
ff=${usage_fail_fast:+--fail-fast}; ff=${ff:---no-fail-fast}   # default to running every step
hk check $ff ${usage_fix:+--fix} ${usage_all:+--all} ${usage_pr:+--pr} \
  ${usage_step:+$(printf -- '--step %s ' $usage_step)} \
  ${usage_skip_step:+$(printf -- '--skip-step %s ' $usage_skip_step)}
'''

[tasks.test]
description = "Run Go tests with the race detector"
run = "go test -race -count=1 ./..."

[tasks.setup] # one-time, idempotent bootstrap; re-run when `enter` warns it's stale
description = "One-time, idempotent project bootstrap: install tools, then module deps"
depends_post = ["deps", "setup:stamp"]
run = "mise install"

[tasks.deps]
description = "Download Go module dependencies (cached; skipped when go.mod/go.sum are unchanged)"
sources = ["go.mod", "go.sum"]
outputs = [
  "vendor/modules.txt",
] # vendor/ is committed; freshness tracks the module list
run = "go mod download"

[tasks."setup:stamp"]
hide = true
quiet = true
wait_for = ["deps"]
run = 'printf %s "{{vars.setup_version}}" > .mise/setup && echo "✅ Setup v{{vars.setup_version}} stamped"'

[tasks."setup:check"]
hide = true
quiet = true
run = '[ "$(cat .mise/setup 2>/dev/null)" = "{{vars.setup_version}}" ] || echo "⚠️  Your setup is stale, run: mise run setup" >&2'

# ── 🪝 hooks ──────────────────────────────────────────────────────────────────
[hooks]
enter = "MISE_OFFLINE=1 mise run setup:check" # nudge when setup is stale; MISE_OFFLINE keeps cd offline-safe
postinstall = "hk install --mise"             # self-install git hooks after every `mise install`

# ── ⚙️ settings ───────────────────────────────────────────────────────────────
[settings]
lockfile = true                     # write/commit mise.lock
minimum_release_age = "7d"          # ignore releases <7d old (supply-chain cooldown)
disable_backends = ["asdf", "vfox"] # resolve only via verified backends

# Use `gh` token to overcome GitHub rate limits, fallback to git credentials.
github.gh_cli_tokens = true
github.use_git_credentials = true
